services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flux-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_password_123"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'SELECT 1' | /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_password_123 -C",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - sql_data:/var/opt/mssql

  webapi:
    build:
      context: ./CleanArchitecture
      dockerfile: CleanArchitecture.WebApi/Dockerfile
    container_name: flux-webapi
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      UseInMemoryDatabase: "false"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CleanArchitectureApplicationDb;User Id=sa;Password=Your_strong_password_123;TrustServerCertificate=True;Encrypt=False"
    ports:
      - "5001:8080"

  dbui:
    image: dbeaver/cloudbeaver:latest
    container_name: flux-dbui
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace

  # Run with: docker compose --profile test run --rm tests
  # (starts sqlserver + webapi if needed, then unit + infrastructure + integration tests)
  tests:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.tests
    container_name: flux-tests
    depends_on:
      sqlserver:
        condition: service_healthy
      webapi:
        condition: service_started
    environment:
      INTEGRATION_API_BASE_URL: http://webapi:8080
      INTEGRATION_SQL_CONNECTION: "Server=sqlserver,1433;Database=CleanArchitectureApplicationDb;User Id=sa;Password=Your_strong_password_123;TrustServerCertificate=True;Encrypt=False"

volumes:
  sql_data:
  cloudbeaver_data:
