name: flux_app
description: A Flutter frontend for the Flux time-tracking app.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  table_calendar: ^3.1.2
  intl: ^0.19.0
  syncfusion_flutter_calendar: ^29.2.5
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/flux_logo.png
